# lefthook.yml — git hooks 团队级门禁
# 跨生态通用: npm / Next / Vite / React

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    prettier:
      glob: "*.{md,yml,yaml,css,scss}"
      run: npx prettier --write --ignore-unknown {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: npx tsc --noEmit
    deadcode:
      run: npx knip --no-progress
